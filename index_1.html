<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>つじいちゃん栽培キット</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#9fd6ec; --sky2:#c9ecf7;
    --grass:#7cb65b; --grass-dark:#548c3a; --grass-deep:#3f6e2c;
    --wood:#7a4f2e; --wood-light:#a06c42;
    --cream:#fff7e6; --gold:#f4c542; --ink:#3b2b1c;
    --skin:#e8b88a; --skin-dark:#c99668;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
    background:linear-gradient(var(--sky2),var(--sky) 40%);
    color:var(--ink);
    user-select:none;-webkit-user-select:none;
    display:flex;flex-direction:column;
  }

  /* ---------- header ---------- */
  #hud{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    background:linear-gradient(var(--wood-light),var(--wood));
    box-shadow:0 3px 0 rgba(0,0,0,.25);
    z-index:20;
  }
  #hud h1{font-size:17px;font-weight:800;color:var(--cream);letter-spacing:.03em;text-shadow:0 2px 0 rgba(0,0,0,.3);flex:1;}
  .tp{
    background:var(--cream);border-radius:999px;padding:5px 14px;
    font-weight:800;font-size:15px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.12);
    display:flex;align-items:center;gap:6px;
  }
  .tp .coin{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe89a,var(--gold) 60%,#c99a1e);box-shadow:0 1px 2px rgba(0,0,0,.3);}

  /* ---------- field ---------- */
  #field{
    position:relative;flex:1;overflow:hidden;
    background:
      radial-gradient(ellipse 140% 90% at 50% 115%, var(--grass-deep), transparent 70%),
      linear-gradient(var(--sky) 0%, var(--sky) 18%, var(--grass) 26%, var(--grass-dark) 100%);
  }
  .cloud{position:absolute;background:#fff;border-radius:999px;opacity:.85;animation:drift linear infinite;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
  .cloud::before{width:55%;height:160%;left:15%;top:-70%;}
  .cloud::after{width:45%;height:130%;right:12%;top:-45%;}
  @keyframes drift{from{transform:translateX(-160px);}to{transform:translateX(calc(100vw + 160px));}}
  .tree{position:absolute;bottom:70%;width:46px;height:60px;}
  .tree::before{content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:8px;height:16px;background:#6b4426;border-radius:2px;}
  .tree::after{content:'';position:absolute;left:50%;bottom:10px;transform:translateX(-50%);
    border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:48px solid #3f7a33;
    filter:drop-shadow(0 -14px 0 #4c9040);}

  /* ---------- tsuji ---------- */
  .slot{position:absolute;width:0;height:0;}
  .tsuji{
    position:absolute;left:0;bottom:0;transform:translateX(-50%);
    transform-origin:50% 100%;
    width:90px;display:flex;flex-direction:column;align-items:center;
    cursor:pointer;
  }
  .tsuji .inner{
    display:flex;flex-direction:column;align-items:center;
    transform-origin:50% 100%;
    animation:sway 2.6s ease-in-out infinite;
  }
  @keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
  .tsuji .face{
    width:64px;height:64px;border-radius:50%;
    background-size:cover;background-position:center;
    box-shadow:0 3px 6px rgba(0,0,0,.25);
    z-index:2;
  }
  .tsuji svg{margin-top:-10px;display:block;}
  .tsuji .shadow{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    width:60px;height:12px;border-radius:50%;background:rgba(0,0,0,.22);z-index:-1;
  }
  /* growth stages */
  .tsuji.sprout .inner{transform:scale(.35);animation:none;}
  .tsuji.grow .inner{transform:scale(.68);animation:sway 3.4s ease-in-out infinite;}
  .tsuji.ready .inner{animation:sway 1.6s ease-in-out infinite;}
  .tsuji.sprout,.tsuji.grow{filter:saturate(.85);}
  .tsuji.ready::after{
    content:'✨';position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-size:16px;animation:twinkle 1s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:1;transform:translateX(-50%) scale(1);}50%{opacity:.4;transform:translateX(-50%) scale(.7);}}
  .tsuji.wilt{filter:saturate(.15) brightness(.85);}
  .tsuji.wilt .inner{animation:none;transform:rotate(6deg) scaleY(.88);}
  .tsuji.gold .face{box-shadow:0 0 18px 6px rgba(244,197,66,.85),0 3px 6px rgba(0,0,0,.25);}
  .tsuji.gold svg path,.tsuji.gold svg ellipse{fill:var(--gold) !important;}
  .tsuji.gold{filter:drop-shadow(0 0 8px rgba(244,197,66,.7));}
  /* harvest pop */
  .tsuji.pop{pointer-events:none;}
  .tsuji.pop .inner{animation:pop .55s ease-out forwards;}
  @keyframes pop{
    0%{transform:scale(1) rotate(0) translateY(0);}
    30%{transform:scale(1.25) rotate(-12deg) translateY(-26px);}
    100%{transform:scale(.2) rotate(360deg) translateY(-150px);opacity:0;}
  }
  .floaty{
    position:absolute;font-weight:800;font-size:16px;color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.35);pointer-events:none;
    animation:floatUp 1s ease-out forwards;z-index:15;white-space:nowrap;
  }
  @keyframes floatUp{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-56px);}}

  /* ---------- footer ---------- */
  #dock{
    display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(var(--wood-light),var(--wood));
    box-shadow:0 -3px 0 rgba(0,0,0,.2);z-index:20;
  }
  .btn{
    flex:1;border:none;border-radius:14px;padding:11px 6px;
    font-family:inherit;font-weight:800;font-size:14px;color:var(--ink);
    background:var(--cream);box-shadow:0 3px 0 rgba(0,0,0,.28);
    cursor:pointer;transition:transform .06s;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.28);}
  .btn.gold{background:linear-gradient(#ffe08a,var(--gold));}
  .btn:disabled{opacity:.45;}

  /* ---------- modal ---------- */
  #modal{
    position:fixed;inset:0;background:rgba(30,20,10,.55);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  #modal.show{display:flex;}
  .panel{
    background:var(--cream);border-radius:20px;max-width:400px;width:100%;
    max-height:80vh;overflow-y:auto;padding:20px;
    box-shadow:0 8px 0 rgba(0,0,0,.3);
  }
  .panel h2{font-size:18px;font-weight:800;margin-bottom:14px;text-align:center;}
  .zukan{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .card{
    background:#fff;border-radius:14px;padding:10px 6px;text-align:center;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
  }
  .card .cface{width:46px;height:46px;border-radius:50%;background-size:cover;margin:0 auto 6px;}
  .card.locked .cface{filter:brightness(0) opacity(.25);}
  .card .cname{font-size:11px;font-weight:800;}
  .card .ccount{font-size:10px;opacity:.65;}
  .close{display:block;margin:16px auto 0;border:none;background:var(--wood);color:var(--cream);
    font-family:inherit;font-weight:800;padding:9px 30px;border-radius:999px;cursor:pointer;}

  #toast{
    position:fixed;top:64px;left:50%;transform:translateX(-50%);
    background:rgba(59,43,28,.92);color:#fff;font-weight:800;font-size:13px;
    padding:8px 18px;border-radius:999px;opacity:0;transition:opacity .3s;z-index:60;pointer-events:none;
  }
  #toast.show{opacity:1;}
</style>
</head>
<body>

<div id="hud">
  <h1>🍄 つじいちゃん栽培キット</h1>
  <div class="tp"><span class="coin"></span><span id="tpVal">0</span> TP</div>
</div>

<div id="field"></div>

<div id="dock">
  <button class="btn" id="zukanBtn">📖 図鑑</button>
  <button class="btn gold" id="feedBtn">🧪 栄養剤 (10TP)</button>
</div>

<div id="modal">
  <div class="panel">
    <h2>つじい図鑑</h2>
    <div class="zukan" id="zukanGrid"></div>
    <button class="close" id="closeBtn">とじる</button>
  </div>
</div>

<div id="toast"></div>

/* ---------- species ---------- */
const SPECIES = [
  {id:'normal', name:'つじいちゃん',   tp:1,  rate:46, scale:1.0,  body:'chibi',  grow:[3000,6000],  desc:'基本のつじい。'},
  {id:'chibi',  name:'ちびつじい',     tp:1,  rate:22, scale:0.72, body:'chibi',  grow:[2000,4000],  desc:'小さくてすばしっこい。'},
  {id:'deka',   name:'でかつじい',     tp:3,  rate:16, scale:1.25, body:'deka',   grow:[5000,9000],  desc:'おなかが立派。'},

/* ---------- state ---------- */
let tp = 0;
const zukan = {}; // id -> count
SPECIES.forEach(s => zukan[s.id] = 0);

const field = document.getElementById('field');
const tpVal = document.getElementById('tpVal');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 1600);
}
function addTP(n){ tp += n; tpVal.textContent = tp; }

/* ---------- scenery ---------- */
function scenery(){
  for(let i=0;i<3;i++){
    const c=document.createElement('div');
    c.className='cloud';
    const w=60+Math.random()*60;
    c.style.cssText=`width:${w}px;height:${w*0.33}px;top:${4+Math.random()*10}%;animation-duration:${40+Math.random()*40}s;animation-delay:${-Math.random()*40}s;`;
    field.appendChild(c);
  }
  for(let i=0;i<5;i++){
    const t=document.createElement('div');
    t.className='tree';
    t.style.left=(4+i*20+Math.random()*8)+'%';
    t.style.transform=`scale(${0.7+Math.random()*0.5})`;
    field.appendChild(t);
  }
}

/* ---------- slots ---------- */
const SLOTS = [
  {x:16,y:46},{x:42,y:42},{x:70,y:45},{x:88,y:52},
  {x:10,y:66},{x:33,y:62},{x:58,y:64},{x:82,y:70},
  {x:22,y:84},{x:48,y:82},{x:72,y:88},{x:90,y:80},
];

function pickSpecies(){
  const total = SPECIES.reduce((a,s)=>a+s.rate,0);
  let r = Math.random()*total;
  for(const s of SPECIES){ r -= s.rate; if(r<0) return s; }
  return SPECIES[0];
}

let boost = 1;

function spawnAt(slot, delay){
  setTimeout(()=>{
    const sp = pickSpecies();
    const el = document.createElement('div');
    el.className = 'tsuji sprout' + (sp.id==='gold' ? ' gold' : '');
    const depth = slot.y/100;                       // perspective: lower = bigger
    const size = sp.scale * (0.65 + depth*0.55);
    el.style.left = slot.x + '%';
    el.style.top  = slot.y + '%';
    el.style.zIndex = Math.round(slot.y);
    el.style.transform = `translateX(-50%) scale(${size})`;
    el.innerHTML = `
      <div class="inner">
        <div class="face" style="background-image:url('${FACE}')"></div>
        ${BODIES[sp.body]}
      </div>
      <div class="shadow"></div>`;
    field.appendChild(el);

    const growMs = (sp.grow[0] + Math.random()*(sp.grow[1]-sp.grow[0])) / boost;
    let state = 'sprout';
    const t1 = setTimeout(()=>{ el.classList.replace('sprout','grow'); state='grow'; }, growMs*0.45);
    const t2 = setTimeout(()=>{ el.classList.replace('grow','ready'); state='ready'; }, growMs);
    const t3 = setTimeout(()=>{                     // wilt if ignored
      if(state!=='ready') return;
      el.classList.remove('ready'); el.classList.add('wilt'); state='wilt';
    }, growMs + 18000);

    el.addEventListener('pointerdown', ()=>{
      if(state==='sprout' || state==='grow'){
        showToast('まだ育っていない…🌱'); return;
      }
      clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);
      const wilted = (state==='wilt');
      const spec = wilted ? SPECIES.find(s=>s.id==='wilt') : sp;
      zukan[spec.id]++;
      addTP(spec.tp);
      floaty(el, wilted ? 'しおしお…' : `+${spec.tp} TP ${spec.id==='gold'?'✨金のつじい!!':''}`);
      el.classList.add('pop');
      state='done';
      setTimeout(()=>el.remove(), 600);
      spawnAt(slot, 1500 + Math.random()*4000);     // regrow
    });
  }, delay);
}

function floaty(el, text){
  const f = document.createElement('div');
  f.className='floaty';
  f.textContent = text;
  f.style.left = el.style.left;
  f.style.top  = `calc(${el.style.top} - 60px)`;
  f.style.transform='translateX(-50%)';
  field.appendChild(f);
  setTimeout(()=>f.remove(), 1000);
}

/* ---------- fertilizer ---------- */
document.getElementById('feedBtn').addEventListener('click', ()=>{
  if(tp < 10){ showToast('TPが足りない！収穫しよう🍄'); return; }
  addTP(-10);
  boost = 3;
  showToast('栄養剤投入！30秒間 成長3倍🧪');
  setTimeout(()=>{ boost = 1; showToast('栄養剤の効果が切れた'); }, 30000);
});

/* ---------- zukan ---------- */
const modal = document.getElementById('modal');
document.getElementById('zukanBtn').addEventListener('click', ()=>{
  const grid = document.getElementById('zukanGrid');
  grid.innerHTML = SPECIES.map(s=>{
    const got = zukan[s.id] > 0;
    return `<div class="card ${got?'':'locked'}">
      <div class="cface" style="background-image:url('${FACE}')"></div>
      <div class="cname">${got ? s.name : '？？？'}</div>
      <div class="ccount">${got ? '×'+zukan[s.id] : '未発見'}</div>
    </div>`;
  }).join('');
  modal.classList.add('show');
});
document.getElementById('closeBtn').addEventListener('click', ()=>modal.classList.remove('show'));
modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('show'); });

/* ---------- start ---------- */
scenery();
SLOTS.forEach((s,i)=>spawnAt(s, 400 + i*700 + Math.random()*1200));
showToast('つじいちゃんが育ったらタップで収穫！');
</script>
